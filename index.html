<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso - Premios 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="img/logo.png">

</head>

<body>
    <div class="background-glow"></div>

    <div class="login-wrapper">
        <div class="login-container">

            <h1>Premios 2026</h1>
            <p>Ingresa el código de acceso</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="field">
                    <label for="accessCode">Código de acceso:</label>
                    <input type="password" id="accessCode" placeholder="Ingresa el código..." required
                        autocomplete="off" />
                    <div class="error-message" id="errorMessage">Código incorrecto. Intenta de nuevo.</div>
                </div>

                <button type="submit" class="btn-primary">Entrar</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
